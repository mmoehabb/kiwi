[package]
name = "kiwi"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1.89"
eframe = "0.34.2"
egui = "0.34.2"
reqwest = { version = "0.13.4", features = ["rustls", "json"] }
rhai = "1.25.0"
scraper = "0.27.0"
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.52.3", features = ["full"] }
urlencoding = "2.1.3"

[dev-dependencies]
mockito = "1.7.2"
